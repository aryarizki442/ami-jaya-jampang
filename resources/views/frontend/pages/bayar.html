<!DOCTYPE html>
<html>
<head>
    <title>Bayar Order AJJ-20260412-0002</title>

</head>
<body>
    <div style="text-align: center; margin-top: 100px;">
        <h1>Total Pembayaran: Rp1.300.000</h1>
        <button id="pay-button" style="background: green; color: white; padding: 15px 30px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer;">
            💳 Bayar Sekarang
        </button>
    </div>

    <script>
        var snapToken = 'dc67e51a-aa4a-479b-83d4-ca4205b39172';
        
        document.getElementById('pay-button').onclick = function() {
            window.snap.pay(snapToken, {
                onSuccess: function(result) {
                    console.log('SUKSES:', result);
                    alert('✅ Pembayaran Berhasil!\n\nOrder: AJJ-20260412-0002\nTotal: Rp1.300.000');
                    window.location.href = 'http://127.0.0.1:8000/api/orders/7';

                onPending: function(result) {
                    console.log('PENDING:', result);
                    alert('⏳ Menunggu pembayaran, segera selesaikan pembayaran Anda');
                },
                onError: function(result) {
                    console.log('ERROR:', result);
                    alert('❌ Pembayaran gagal, silakan coba lagi');
                }
            });
        };
    </script>
</body>
</html>
